# nginx-ollama.conf
# Proxies ollama running on host into the agents-net docker network
# Place at: ~/agents-hq/runtime/nginx-ollama.conf

server {
    listen 11434;

    location / {
        proxy_pass http://host.docker.internal:11434;
        proxy_http_version 1.1;

        # Required for ollama streaming responses
        proxy_set_header Connection '';
        chunked_transfer_encoding on;
        proxy_buffering off;
        proxy_cache off;

        proxy_set_header Host localhost;
        proxy_set_header X-Real-IP $remote_addr;

        # Generous timeouts — DeepSeek-R1 thinks for a while
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
    }
}
